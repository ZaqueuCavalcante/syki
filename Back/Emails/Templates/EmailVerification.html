<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px;margin:0 auto;background-color:#ffffff">
        <tbody>
            <tr>
                <td style="padding:5px 18px 10px">
                    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="border-top:1px solid #ffffff">
                        <tbody>
                            <tr><td><span></span></td></tr>
                        </tbody>
                    </table>
                </td>
            </tr>
            <tr>
                <td style="padding:9px 18px">
                    <strong><span style="font-size:24px;font-family:helvetica neue,helvetica,arial,verdana,sans-serif">Bem-vindo à Estud!</span></strong>
                    <br><br><br>
                    <span style="font-size:14px;font-family:helvetica neue,helvetica,arial,verdana,sans-serif">Sua conta foi criada com sucesso. Para definir sua senha e acessar a plataforma, clique no botão abaixo.</span>
                </td>
            </tr>
            <tr>
                <td align="center" style="padding:18px 18px 24px">
                    <table border="0" cellpadding="0" cellspacing="0">
                        <tr>
                            <td align="center" style="border-radius:6px;background-color:#7c3aed">
                                <a href="{{link}}" target="_blank" style="display:inline-block;padding:14px 32px;font-size:16px;font-family:helvetica neue,helvetica,arial,verdana,sans-serif;font-weight:bold;color:#ffffff;text-decoration:none;border-radius:6px">
                                    DEFINIR SENHA
                                </a>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td style="padding:0 18px 9px">
                    <span style="font-size:14px;font-family:helvetica neue,helvetica,arial,verdana,sans-serif">Se você não criou esta conta, ignore este email.</span>
                    <br><br><br>
                    <span style="font-size:14px;font-family:helvetica neue,helvetica,arial,verdana,sans-serif"><strong>Time Estud</strong></span>
                    <br><br><br>
                    <span style="font-size:10px;font-family:helvetica neue,helvetica,arial,verdana,sans-serif"><strong>Não consegue clicar no botão?</strong> Copie e cole o seguinte endereço no seu navegador: <a href="{{link}}" target="_blank">{{link}}</a></span>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
